<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KXD AI - Absolute Edition</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9002781874836914"
     crossorigin="anonymous"></script>
    <style>
        :root {
            --bg: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #00f2ff;
        }
        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #hud {
            padding: 20px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: var(--accent);
        }
        .dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }
        .dot.thinking {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .msg {
            max-width: 80%;
            padding: 15px;
            border-radius: 15px;
            line-height: 1.5;
        }
        .user {
            align-self: flex-end;
            background: var(--accent);
            color: #000;
        }
        .ai {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #input-area {
            padding: 20px;
            background: var(--glass);
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            outline: none;
        }
        button {
            background: var(--accent);
            border: none;
            padding: 0 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div style="font-weight: bold; letter-spacing: 2px;">KXD AI <span style="font-weight: normal; opacity: 0.5;">ABSOLUTE</span></div>
        <div class="status">
            <div id="dot" class="dot"></div>
            NEURAL LINK SECURED
        </div>
    </div>
    <div id="chat">
        <div class="msg ai">Neural link secured for meeting. Unlimited Core online. KD is ready, Boss.</div>
    </div>
    <div id="input-area">
        <input type="text" id="txt" placeholder="Command KXD AI..." autofocus>
        <button id="btn">SEND</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
