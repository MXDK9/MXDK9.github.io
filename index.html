<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KXD AI - Absolute Edition</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9002781874836914"
     crossorigin="anonymous"></script>
    <style>
    :root { --bg: #030303; --hud: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --acc: #00e5ff; --txt: #f0f0f0; }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; height: 100dvh; margin: 0; display: flex; flex-direction: column; overflow: hidden; background-image: radial-gradient(circle at 50% -20%, rgba(0,229,255,0.15) 0%, transparent 60%); }
    .main { flex: 1; width: 100%; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; padding: 20px; backdrop-filter: blur(10px); }
    header { border-bottom: 1px solid var(--border); padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; color: #fff; }
    .status { font-size: 10px; color: #00e5ff; background: rgba(0,229,255,0.05); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(0,229,255,0.2); display: flex; align-items: center; gap: 8px; font-weight: 700; text-transform: uppercase; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #00e5ff; box-shadow: 0 0 10px #00e5ff; }
    .dot.thinking { animation: pulse 0.8s infinite alternate; }
    @keyframes pulse { from { opacity: 0.4; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }
    #chat { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 15px; }
    .msg { max-width: 85%; padding: 12px 18px; border-radius: 18px; font-size: 14px; animation: slide 0.3s ease-out; line-height: 1.5; }
    @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .user { align-self: flex-end; background: var(--hud); border: 1px solid var(--border); border-bottom-right-radius: 4px; }
    .ai { align-self: flex-start; background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.1); border-bottom-left-radius: 4px; color: #e0faff; }
    .input-area { background: var(--hud); padding: 8px; border-radius: 30px; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    input { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 15px; outline: none; }
    button { background: var(--acc); color: #000; border: none; padding: 12px 24px; border-radius: 25px; font-weight: 800; cursor: pointer; font-size: 12px; text-transform: uppercase; }

    /* MOBILE FIXES */
    @media (max-width: 600px) {
        .main { padding: 15px; }
        header { flex-direction: column; gap: 10px; text-align: center; }
        .msg { max-width: 95%; font-size: 13px; }
        .input-area { border-radius: 20px; }
        button { padding: 10px 20px; }
    }
    </style>
</head>
<body>
    <div class="main">
        <header>
            <div class="logo">KXD AI</div>
            <div class="status">
                <div class="dot thinking" id="statusDot"></div>
                <span id="statusTxt">Neural link active</span>
            </div>
        </header>
        <div id="chat"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Neural command..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
    </html>
