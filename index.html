<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KXD AI - Advanced Cognitive Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --hud: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); --acc: #00e5ff; --txt: #f0f0f0; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden; background-image: radial-gradient(circle at 50% -20%, rgba(0,229,255,0.2) 0%, transparent 60%); }
        .main { flex: 1; width: 100%; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; padding: 15px; position: relative; }
        header { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.1rem; font-weight: 900; letter-spacing: 2px; color: #fff; }
        .status { font-size: 9px; color: var(--acc); background: rgba(0,229,255,0.08); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(0,229,255,0.2); display: flex; align-items: center; gap: 5px; font-weight: 700; text-transform: uppercase; }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--acc); box-shadow: 0 0 8px var(--acc); }
        #chat { flex: 1; overflow-y: auto; padding: 15px 0; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 88%; padding: 10px 15px; border-radius: 18px; font-size: 14px; animation: slide 0.2s ease-out; line-height: 1.4; word-wrap: break-word; }
        @keyframes slide { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: var(--hud); border: 1px solid var(--border); border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: rgba(0,229,255,0.05); border: 1px solid rgba(0,229,255,0.1); border-bottom-left-radius: 4px; color: #e0faff; }
        .input-area { background: var(--hud); padding: 5px; border-radius: 25px; border: 1px solid var(--border); display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px 15px; font-size: 16px; outline: none; }
        button { background: var(--acc); color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 900; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        @media (max-width: 600px) { .logo { font-size: 0.9rem; } .status { padding: 3px 8px; font-size: 8px; } .msg { font-size: 13px; max-width: 92%; } header { border-bottom: none; } }
    </style>
</head>
<body>
    <div class="main">
        <header>
            <div class="logo">KXD AI <span style="font-weight:400; opacity:0.6; font-size:0.8rem;">ABSOLUTE</span></div>
            <div class="status"><div id="dot" class="dot"></div> NEURAL LINK SECURED</div>
        </header>
        <div id="chat"></div>
        <div class="input-area">
            <input type="text" id="txt" placeholder="Command KXD AI..." autocomplete="off">
            <button id="btn">Send</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
